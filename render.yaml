# render.yaml — Configuração de deploy no Render (Infrastructure as Code)
# Ref: https://docs.render.com/blueprint-spec

services:
  - type: web
    name: relatoriocep-api
    runtime: python
    region: oregon
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn core.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        sync: false  # Definir manualmente após deploy do frontend
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_CREDENTIALS_FILE
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.6"
