# /etc/nginx/sites-available/relatoriocep
# Configuração Nginx para RelatorioCEP (Django + React)
#
# Após copiar este arquivo:
#   sudo ln -s /etc/nginx/sites-available/relatoriocep /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name SEU_DOMINIO_OU_IP;

    # Frontend React (arquivos estáticos do build)
    root /home/deploy/relatoriocep/frontend/dist;
    index index.html;

    # Limite de upload (100 MB para planilhas grandes)
    client_max_body_size 100M;

    # API Django — proxy reverso para Gunicorn
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Django Admin
    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Arquivos estáticos do Django (admin CSS/JS)
    location /static/ {
        alias /home/deploy/relatoriocep/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Arquivos de mídia (gráficos gerados, uploads)
    location /media/ {
        alias /home/deploy/relatoriocep/backend/media/;
        expires 7d;
    }

    # React SPA — qualquer rota não reconhecida vai para index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
